<!DOCTYPE html>
<html>

<head>

<title>SHOWY Coverage Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
}

#map{
    height:100vh;
    width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyhOBAiWgj8h-y4Z34GUeClyGM4mBxytaW8myyC8RUHC7M4Kv6r_cpwH83XcZaVagfQ/exec";

const map =
L.map('map')
.setView([12.9716,77.5946],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

async function loadPins(){

    const response =
    await fetch(API);

    const data =
    await response.json();

    data.forEach(item=>{

        if(item.lat && item.lng){

            L.marker([
                item.lat,
                item.lng
            ])
            .addTo(map)

            .bindPopup(`

            <b>${item.propertyName || ""}</b>

            <br><br>

            Client:
            ${item.clientName || ""}

            <br>

            Covered By:
            ${item.marketing1 || ""}

            <br>

            Service:
            ${item.service || ""}

            <br><br>

            <a href="${item.photoURL}"
            target="_blank">

            View Photo

            </a>

            <br><br>

            Remarks:
            ${item.remarks || ""}

            `);

        }

    });

}

loadPins();

</script>

</body>

</html>
