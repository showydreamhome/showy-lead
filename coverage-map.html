<!DOCTYPE html>
<html>

<head>

<title>SHOWY Coverage Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
}

#map{
    height:calc(100vh - 60px);
    width:100%;
}

#locateBtn{

    position:fixed;

    right:20px;

    bottom:40px;

    width:65px;

    height:65px;

    border-radius:50%;

    border:none;

    background:white;

    font-size:30px;

    cursor:pointer;

    z-index:99999;

    box-shadow:0 4px 15px rgba(0,0,0,.25);

}

#mapTitle{

    position:absolute;

    top:75px;

    left:50%;

    transform:translateX(-50%);

    z-index:99999;

    background:black;

    color:gold;

    padding:12px 25px;

    border-radius:30px;

    font-size:18px;

    font-weight:bold;

    border:2px solid gold;

}

</style>

</head>

<body>

<input
type="text"
id="searchBox"
placeholder="🔍 Search Client / Property"
style="
width:100%;
padding:15px;
font-size:16px;
border:none;
outline:none;
background:white;
">

<div id="mapTitle">

🏠 SHOWY LEADS MAP

</div>

<div id="map"></div>

<button id="locateBtn">
🎯
</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyhOBAiWgj8h-y4Z34GUeClyGM4mBxytaW8myyC8RUHC7M4Kv6r_cpwH83XcZaVagfQ/exec";

const map =
L.map('map');

let userMarker;
let userCircle;
let allMarkers = [];

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

navigator.geolocation.getCurrentPosition(

function(pos){

    const lat =
    pos.coords.latitude;

    const lng =
    pos.coords.longitude;

    map.setView(
        [lat,lng],
        16
    );

});

navigator.geolocation.watchPosition(

function(pos){

    const lat =
    pos.coords.latitude;

    const lng =
    pos.coords.longitude;

    if(userMarker){

        map.removeLayer(userMarker);

    }

    if(userCircle){

        map.removeLayer(userCircle);

    }

    userCircle =
    L.circle(

        [lat,lng],

        {
            radius:25,
            color:"#4285F4",
            fillColor:"#4285F4",
            fillOpacity:0.15,
            weight:2
        }

    ).addTo(map);

    userMarker =
    L.circleMarker(

        [lat,lng],

        {
            radius:10,
            fillColor:"#4285F4",
            color:"#ffffff",
            weight:3,
            fillOpacity:1
        }

    ).addTo(map);

});

async function loadPins(){

    const response =
    await fetch(API);

    const data =
    await response.json();

    data.forEach(item=>{

        if(item.lat && item.lng){

            const marker =
            L.marker([

                parseFloat(item.lat),

                parseFloat(item.lng)

            ])

            .addTo(map)

            .bindPopup(`

            <div style="width:250px">

            <h3>

            ${item.propertyName || "Property"}

            </h3>

            <b>Client:</b>
            ${item.clientName || "-"}

            <br>

            <b>Covered By:</b>
            ${item.marketing1 || "-"}

            <br>

            <b>Service:</b>
            ${item.service || "-"}

            <br><br>

            <img

            src="${item.photoURL || ''}"

            style="

            width:100%;

            border-radius:10px;

            ">

            <br><br>

            <b>Remarks:</b>

            ${item.remarks || "-"}

            </div>

            `);

            marker.searchText =

            (

            (item.clientName || "") +

            " " +

            (item.propertyName || "")

            ).toLowerCase();

            allMarkers.push(marker);

        }

    });

}

loadPins();

document

.getElementById("searchBox")

.addEventListener(

"keyup",

function(){

    const search =

    this.value.toLowerCase();

    allMarkers.forEach(marker=>{

        if(

            marker.searchText

            .includes(search)

        ){

            marker.addTo(map);

        }

        else{

            map.removeLayer(marker);

        }

    });

});

document
.getElementById("locateBtn")
.addEventListener(
"click",
function(){

    navigator.geolocation.getCurrentPosition(

    function(pos){

        const lat =
        pos.coords.latitude;

        const lng =
        pos.coords.longitude;

        map.flyTo(
            [lat,lng],
            18,
            {
                animate:true,
                duration:1.5
            }
        );

    },

    function(error){

        alert(
        "Location Permission Required"
        );

    }

    );

});

</script>

</body>

</html>
