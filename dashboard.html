<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHOWY CRM Dashboard</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    color:gold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

th{
    background:gold;
    color:black;
    padding:15px;
}

td{
    background:#111;
    padding:12px;
}

button{
    border:none;
    padding:8px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.photo-btn{
    background:#2196f3;
    color:white;
}

.map-btn{
    background:gold;
    color:black;
}

</style>

</head>

<body>

<h1>SHOWY CRM DASHBOARD</h1>

<table>

<thead>

<tr>

<th>Lead ID</th>
<th>Client</th>
<th>WhatsApp</th>
<th>Property</th>
<th>Type</th>
<th>Service</th>
<th>Sales</th>
<th>Photo</th>
<th>Location</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbyhOBAiWgj8h-y4Z34GUeClyGM4mBxytaW8myyC8RUHC7M4Kv6r_cpwH83XcZaVagfQ/exec";

async function loadData(){

    const response = await fetch(API);

    const data = await response.json();

    const tableBody = document.getElementById("tableBody");

    tableBody.innerHTML = "";

    data.reverse().forEach(row=>{

        tableBody.innerHTML += `

        <tr>

        <td>${row.leadID || "-"}</td>

        <td>${row.clientName || "-"}</td>

        <td>

        <a href="https://wa.me/91${row.whatsapp}" target="_blank">

        ${row.whatsapp || "-"}

        </a>

        </td>

        <td>${row.propertyName || "-"}</td>

        <td>${row.propertyType || "-"}</td>

        <td>${row.service || "-"}</td>

        <td>${row.marketing1 || "-"}</td>

        <td>

${
    row.photoURL
    ?
    `<button class="photo-btn"
    onclick="window.open('${row.photoURL}','_blank')">
    View
    </button>`
    :
    "-"
}

</td>

        <td>

        <a href="https://maps.google.com/?q=${row.lat || 0},${row.lng || 0}" target="_blank">

        <button class="map-btn">
        Map
        </button>

        </a>

        </td>

        </tr>

        `;

    });

}

loadData();

</script>

</body>
</html>
